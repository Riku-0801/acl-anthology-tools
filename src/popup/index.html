<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACL Anthology Tools</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #343a40;
      background: #fff;
      width: 380px;
      min-height: 300px;
      max-height: 600px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #0d6efd;
      color: #fff;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
    }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid #dee2e6;
      background: #f8f9fa;
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-size: 12px;
      color: #6c757d;
      transition: color 0.15s;
    }

    .tab-btn.active {
      color: #0d6efd;
      border-bottom-color: #0d6efd;
      font-weight: 600;
    }

    .tab-btn:hover {
      color: #0d6efd;
    }

    .tab-content {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .tab-content.active {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* Bookmark list */
    .bookmark-item {
      padding: 8px;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      transition: background 0.1s;
    }

    .bookmark-item:hover {
      background: #f0f4ff;
    }

    .bookmark-item .bm-title {
      font-weight: 600;
      font-size: 12px;
      color: #0d6efd;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bookmark-item .bm-authors {
      font-size: 11px;
      color: #6c757d;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bookmark-item .bm-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
    }

    .bookmark-item .bm-date {
      font-size: 10px;
      color: #adb5bd;
    }

    .bookmark-item .bm-remove {
      font-size: 10px;
      color: #dc3545;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .bookmark-item .bm-remove:hover {
      text-decoration: underline;
    }

    /* Settings */
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .settings-row label {
      font-size: 12px;
      color: #495057;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #ced4da;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      left: 3px;
      top: 3px;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: #0d6efd;
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(16px);
    }

    /* Export section */
    .export-section {
      margin-top: 8px;
    }

    .export-section h3 {
      font-size: 12px;
      color: #6c757d;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .export-btn {
      display: block;
      width: 100%;
      padding: 7px 12px;
      margin-bottom: 6px;
      background: #fff;
      border: 1px solid #ced4da;
      border-radius: 4px;
      font-size: 12px;
      color: #495057;
      cursor: pointer;
      text-align: left;
      transition: background 0.1s;
    }

    .export-btn:hover {
      background: #e9ecef;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      color: #6c757d;
      text-align: center;
      gap: 8px;
    }

    .empty-state .empty-icon {
      font-size: 32px;
    }

    .empty-state p {
      font-size: 12px;
    }

    /* Count badge */
    .count-badge {
      background: #0d6efd;
      color: #fff;
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 10px;
      margin-left: 4px;
    }
  </style>
</head>
<body>
  <header>
    <h1>ACL Anthology Tools</h1>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="bookmarks">
      ブックマーク<span id="bookmark-count" class="count-badge">0</span>
    </button>
    <button class="tab-btn" data-tab="settings">設定 / エクスポート</button>
  </div>

  <div id="tab-bookmarks" class="tab-content active">
    <!-- Bookmark list will be injected here -->
    <div class="empty-state" id="bookmarks-empty">
      <span class="empty-icon">☆</span>
      <p>ブックマークがありません。<br>論文ページで「☆ 保存」ボタンをクリックして追加できます。</p>
    </div>
    <div id="bookmarks-list"></div>
  </div>

  <div id="tab-settings" class="tab-content">
    <div class="settings-row">
      <label for="toggle-abstract-preview">アブストラクトプレビュー</label>
      <label class="toggle">
        <input type="checkbox" id="toggle-abstract-preview" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="export-section" style="margin-top: 16px;">
      <h3>エクスポート</h3>
      <button class="export-btn" id="btn-export-bookmarks">
        📤 ブックマークをJSONで書き出し
      </button>
      <button class="export-btn" id="btn-export-reads">
        📊 既読記録をCSVで書き出し
      </button>
    </div>
  </div>

  <script type="module" src="./index.ts"></script>
</body>
</html>
